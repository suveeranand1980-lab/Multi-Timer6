<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTimer App</title>
    <style>
        /* General styling mimicking Kivy's dark theme */
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }

        .active-screen {
            display: flex;
        }

        /* Main Screen Elements */
        #time-label {
            font-size: 48px;
            text-align: center;
            margin: 10px 0;
            flex: 0.2;
        }

        #lap-scroll {
            flex: 0.2;
            overflow-y: auto;
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .lap-item {
            color: #e6e6e6;
            margin: 0;
            font-size: 16px;
        }

        .status-label {
            color: #b3b3b3;
            text-align: center;
            font-size: 14px;
        }

        /* Countdown Inputs */
        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex: 0.15;
        }

        .input-row label {
            font-size: 20px;
            flex: 0.5;
            text-align: right;
            padding-right: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }

        .mini-btn {
            padding: 4px 8px;
            font-size: 14px;
            background-color: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .mini-btn:hover {
            background-color: #666;
        }

        .time-input {
            width: 50px;
            font-size: 24px;
            text-align: center;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 5px;
        }

        /* Progress Bar */
        .progress-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0.1;
        }

        .progress-box label {
            width: 50px;
            text-align: center;
        }

        input[type="range"] {
            flex: 1;
            cursor: pointer;
        }

        /* Volume Box */
        .vol-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex: 0.15;
        }

        .vol-btn {
            background-color: #4d4d4d;
            color: white;
            font-size: 24px;
            border: none;
            border-radius: 5px;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        /* Button Grids */
        .btn-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            flex: 0.2;
        }

        .neon-btn {
            border: none;
            border-radius: 25px;
            color: black;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .neon-btn:hover {
            opacity: 0.8;
        }

        /* Game & Alarm Screen Elements */
        .screen-title {
            font-size: 32px;
            text-align: center;
            flex: 0.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #tic-tac-toe-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            flex: 0.6;
        }

        .ttt-btn {
            font-size: 50px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .back-btn {
            flex: 0.2;
            font-size: 24px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<div id="app-container">
    
    <!-- MAIN SCREEN -->
    <div id="main-screen" class="screen active-screen">
        
        <div id="time-label">00:00:00</div>

        <div id="lap-scroll">
            <!-- Laps will be prepended here -->
        </div>

        <div id="song-label" class="status-label">No song selected</div>
        <div id="alarm-label" class="status-label">No alarm selected</div>

        <div class="input-row">
            <label>Set Timer: <button class="mini-btn" onclick="openAlarmScreen()">⏰</button></label>
            <input type="number" id="input-h" class="time-input" placeholder="HH" min="0">
            <input type="number" id="input-m" class="time-input" placeholder="MM" min="0">
            <input type="number" id="input-s" class="time-input" placeholder="SS" min="0">
        </div>

        <div class="progress-box">
            <label id="curr-time-label">00:00</label>
            <input type="range" id="music-progress" min="0" max="100" value="0">
            <label id="total-time-label">00:00</label>
        </div>

        <div class="vol-box">
            <button class="vol-btn" onclick="changeVolume(-0.1)">-</button>
            <label id="vol-label" style="font-size: 20px; text-align: center; width: 120px;">Volume: 50%</label>
            <button class="vol-btn" onclick="changeVolume(0.1)">+</button>
        </div>

        <div class="btn-row">
            <button class="neon-btn" style="background-color: #96FF1D;" onclick="startTimer()">Start</button>
            <button class="neon-btn" style="background-color: #FF9C2B;" onclick="pauseTimer()">Pause</button>
            <button class="neon-btn" style="background-color: #DC82FF;" onclick="resetTimer()">Reset</button>
            <button class="neon-btn" style="background-color: #EFFF5F;" onclick="recordLap()">Lap</button>
            <button class="neon-btn" style="background-color: #52fc77;" onclick="setMode('stopwatch')">SW</button>
            <button class="neon-btn" style="background-color: #ff61c2;" onclick="setMode('countdown')">CD</button>
        </div>

        <div class="btn-row">
            <button class="neon-btn" style="background-color: #5856D6;" onclick="document.getElementById('alarm-upload').click()">Alarm</button>
            <button class="neon-btn" style="background-color: #00E5FF;" onclick="document.getElementById('song-upload').click()">Song</button>
            <button class="neon-btn" style="background-color: #00FF9C;" onclick="playMusic()">Play</button>
            <button class="neon-btn" style="background-color: #FFC300;" onclick="pauseMusic()">Pause</button>
            <button class="neon-btn" style="background-color: #FF4C4C;" onclick="stopMusic()">Stop</button>
            <button class="neon-btn" style="background-color: #00FFAA;" onclick="openGame()">Game</button>
        </div>

        <!-- Hidden File Inputs -->
        <input type="file" id="song-upload" accept="audio/*" style="display: none;" onchange="loadSong(event)">
        <input type="file" id="alarm-upload" accept="audio/*" style="display: none;" onchange="loadAlarm(event)">
        
        <!-- Hidden Audio Elements -->
        <audio id="audio-song"></audio>
        <audio id="audio-alarm"></audio>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div id="game-title" class="screen-title">Tic-Tac-Toe - Player X's Turn</div>
        <div id="tic-tac-toe-grid">
            <button class="ttt-btn" onclick="clickCell(0)"></button>
            <button class="ttt-btn" onclick="clickCell(1)"></button>
            <button class="ttt-btn" onclick="clickCell(2)"></button>
            <button class="ttt-btn" onclick="clickCell(3)"></button>
            <button class="ttt-btn" onclick="clickCell(4)"></button>
            <button class="ttt-btn" onclick="clickCell(5)"></button>
            <button class="ttt-btn" onclick="clickCell(6)"></button>
            <button class="ttt-btn" onclick="clickCell(7)"></button>
            <button class="ttt-btn" onclick="clickCell(8)"></button>
        </div>
        <button class="back-btn" onclick="closeGame()">Back</button>
    </div>

    <!-- ALARM SCREEN -->
    <div id="alarm-screen" class="screen">
        <div class="screen-title">Set Clock Alarm</div>
        <div style="flex: 0.6; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
            <input type="time" id="clock-alarm-input" style="font-size: 32px; padding: 10px; background-color: #333; color: white; border: 1px solid #555; border-radius: 5px;">
            <button class="neon-btn" style="background-color: #5856D6; padding: 10px 30px; font-size: 18px; color: white;" onclick="setClockAlarm()">Set Alarm</button>
            <div id="active-alarm-status" class="status-label" style="font-size: 18px;">No active alarm</div>
        </div>
        <button class="back-btn" onclick="closeAlarmScreen()">Back</button>
    </div>

</div>

<script>
    // --- NOTIFICATION LOGIC ---
    // Request permission as soon as the app loads
    if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }

    function showNotification(title, bodyText) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body: bodyText });
        }
    }

    // --- MAIN SCREEN LOGIC ---
    let running = false;
    let mode = "stopwatch";
    let time = 0;
    let timerEvent = null;
    let currentVolume = 0.5;

    const timeLabel = document.getElementById('time-label');
    const lapScroll = document.getElementById('lap-scroll');
    const songLabel = document.getElementById('song-label');
    const alarmLabel = document.getElementById('alarm-label');
    
    const inputH = document.getElementById('input-h');
    const inputM = document.getElementById('input-m');
    const inputS = document.getElementById('input-s');
    
    const volLabel = document.getElementById('vol-label');
    
    const audioSong = document.getElementById('audio-song');
    const audioAlarm = document.getElementById('audio-alarm');
    
    const progressBar = document.getElementById('music-progress');
    const currTimeLabel = document.getElementById('curr-time-label');
    const totalTimeLabel = document.getElementById('total-time-label');

    // Format utility functions
    function formatTime(t) {
        t = Math.floor(t);
        let h = String(Math.floor(t / 3600)).padStart(2, '0');
        let m = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
        let s = String(t % 60).padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function formatMusicTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        seconds = Math.floor(seconds);
        let m = String(Math.floor(seconds / 60)).padStart(2, '0');
        let s = String(seconds % 60).padStart(2, '0');
        return `${m}:${s}`;
    }

    // Timer functions
    function updateTimer() {
        if (!running) return;

        if (mode === "countdown") {
            if (time > 0) {
                time--;
            } else {
                running = false;
                clearInterval(timerEvent);
                timerEvent = null;
                
                // Trigger Background Notification
                showNotification("Time's Up!", "Your countdown timer has finished.");
                
                if (audioAlarm.src) {
                    audioAlarm.volume = currentVolume;
                    audioAlarm.play();
                } else {
                    alert("Time's Up!");
                }
            }
        } else {
            time++;
        }
        timeLabel.innerText = formatTime(time);
    }

    function startTimer() {
        // Double check permission when user starts timer
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        if (!running) {
            if (mode === "countdown" && time === 0) {
                let h = parseInt(inputH.value || "0", 10);
                let m = parseInt(inputM.value || "0", 10);
                let s = parseInt(inputS.value || "0", 10);
                time = (h * 3600) + (m * 60) + s;
            }
            running = true;
            if (!timerEvent) {
                timerEvent = setInterval(updateTimer, 1000);
            }
        }
    }

    function pauseTimer() {
        running = false;
        clearInterval(timerEvent);
        timerEvent = null;
    }

    function resetTimer() {
        running = false;
        clearInterval(timerEvent);
        timerEvent = null;
        time = 0;
        timeLabel.innerText = "00:00:00";
        lapScroll.innerHTML = ""; // Clear laps
    }

    function setMode(m) {
        resetTimer();
        mode = m;
    }

    function recordLap() {
        let lapCount = lapScroll.children.length + 1;
        let lapText = `Lap ${lapCount}: ${timeLabel.innerText}`;
        
        let p = document.createElement("p");
        p.className = "lap-item";
        p.innerText = lapText;
        
        // Add to the top of the lap list
        lapScroll.prepend(p);
    }

    // Audio functions
    function loadSong(event) {
        const file = event.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            audioSong.src = fileURL;
            songLabel.innerText = file.name;
        }
    }

    function loadAlarm(event) {
        const file = event.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            audioAlarm.src = fileURL;
            alarmLabel.innerText = file.name;
        }
    }

    function changeVolume(amount) {
        currentVolume += amount;
        currentVolume = Math.max(0.0, Math.min(1.0, currentVolume)); // Clamp 0 to 1
        volLabel.innerText = `Volume: ${Math.round(currentVolume * 100)}%`;
        
        audioSong.volume = currentVolume;
        audioAlarm.volume = currentVolume;
    }

    function playMusic() {
        if (audioSong.src) {
            audioSong.volume = currentVolume;
            audioSong.play();
        }
    }

    function pauseMusic() {
        if (audioSong.src) {
            audioSong.pause();
        }
    }

    function stopMusic() {
        if (audioSong.src) {
            audioSong.pause();
            audioSong.currentTime = 0;
            progressBar.value = 0;
            currTimeLabel.innerText = "00:00";
        }
    }

    // Music Progress update loop
    setInterval(() => {
        if (audioSong.src && !audioSong.paused) {
            let pos = audioSong.currentTime;
            let length = audioSong.duration;

            if (length > 0) {
                progressBar.max = length;
                progressBar.value = pos;
                currTimeLabel.innerText = formatMusicTime(pos);
                totalTimeLabel.innerText = formatMusicTime(length);
            }
        }
    }, 500);

    // Allow manual scrubbing of music slider
    progressBar.addEventListener('input', (e) => {
        if (audioSong.src) {
            audioSong.currentTime = e.target.value;
        }
    });


    // --- SCREEN MANAGEMENT ---
    const mainScreen = document.getElementById('main-screen');
    const gameScreen = document.getElementById('game-screen');
    const alarmScreen = document.getElementById('alarm-screen');

    function openGame() {
        mainScreen.classList.remove('active-screen');
        gameScreen.classList.add('active-screen');
    }

    function closeGame() {
        gameScreen.classList.remove('active-screen');
        mainScreen.classList.add('active-screen');
    }

    function openAlarmScreen() {
        mainScreen.classList.remove('active-screen');
        alarmScreen.classList.add('active-screen');
    }

    function closeAlarmScreen() {
        alarmScreen.classList.remove('active-screen');
        mainScreen.classList.add('active-screen');
    }


    // --- CLOCK ALARM LOGIC ---
    let scheduledAlarmTime = null;
    let alarmCheckInterval = null;

    function setClockAlarm() {
        // Double check permission when user sets alarm
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        const timeInput = document.getElementById('clock-alarm-input').value;
        if (timeInput) {
            scheduledAlarmTime = timeInput;
            document.getElementById('active-alarm-status').innerText = "Alarm set for: " + scheduledAlarmTime;
            
            if (!alarmCheckInterval) {
                alarmCheckInterval = setInterval(checkClockAlarm, 1000);
            }
        }
    }

    function checkClockAlarm() {
        if (!scheduledAlarmTime) return;

        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${hours}:${minutes}`;

        if (currentTimeStr === scheduledAlarmTime) {
            // Trigger Background Notification
            showNotification("Alarm Ringing!", "Time is " + scheduledAlarmTime);

            if (audioAlarm.src) {
                audioAlarm.volume = currentVolume;
                audioAlarm.play();
            } else {
                alert("ALARM RINGING! Time is " + scheduledAlarmTime);
            }
            
            // Clear the alarm after ringing
            scheduledAlarmTime = null;
            document.getElementById('active-alarm-status').innerText = "No active alarm";
            clearInterval(alarmCheckInterval);
            alarmCheckInterval = null;
        }
    }


    // --- GAME LOGIC ---
    let board = ["", "", "", "", "", "", "", "", ""];
    let turn = "X";
    let gameOver = false;
    let tttButtons = document.getElementsByClassName('ttt-btn');
    const gameTitle = document.getElementById('game-title');

    function clickCell(i) {
        if (board[i] === "" && !gameOver) {
            board[i] = turn;
            tttButtons[i].innerText = turn;

            if (checkWin()) {
                gameTitle.innerText = `Player ${turn} WINS!`;
                gameOver = true;
                setTimeout(resetBoard, 2000);
            } else if (!board.includes("")) {
                gameTitle.innerText = "It's a DRAW!";
                gameOver = true;
                setTimeout(resetBoard, 2000);
            } else {
                turn = turn === "X" ? "O" : "X";
                gameTitle.innerText = `Tic-Tac-Toe - Player ${turn}'s Turn`;
            }
        }
    }

    function checkWin() {
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];
        for (let condition of winConditions) {
            let [a, b, c] = condition;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return true;
            }
        }
        return false;
    }

    function resetBoard() {
        board = ["", "", "", "", "", "", "", "", ""];
        turn = "X";
        gameOver = false;
        gameTitle.innerText = "Tic-Tac-Toe - Player X's Turn";
        for (let btn of tttButtons) {
            btn.innerText = "";
        }
    }

    // Set initial audio volumes
    audioSong.volume = currentVolume;
    audioAlarm.volume = currentVolume;
</script>

</body>
</html>
